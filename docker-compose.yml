services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techbox
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    entrypoint: ["sh", "entrypoint.sh"]
    ports:
      - "4000:4000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/techbox
    volumes:
      - ./api:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "5182:5182"
    volumes:
      - ./client:/app
      - /app/node_modules

  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "5183:5183"
    volumes:
      - ./admin:/app
      - /app/node_modules

volumes:
  pgdata:
